name: Build BiliBiliTweak Patch

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Tweak
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "$THEOS/bin" >> $GITHUB_PATH
      env:
        THEOS: ${{ runner.home }}/theos
    
    - name: Install ldid
      run: brew install ldid
    
    - name: Install iOS SDK
      run: |
        export THEOS=$HOME/theos
        mkdir -p $THEOS/sdks
        cd $THEOS/sdks
        curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.gz || \
        curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS15.5.sdk.tar.gz
        tar -xzf *.sdk.tar.gz || true
        ls $THEOS/sdks/
      env:
        THEOS: ${{ env.THEOS }}
    
    - name: Build Tweak
      run: |
        cd BiliBiliTweak-Patch
        make package FINALPACKAGE=1
      env:
        THEOS: ${{ env.THEOS }}
    
    - name: Upload Deb
      uses: actions/upload-artifact@v4
      with:
        name: BiliBiliTweakPatch.deb
        path: BiliBiliTweak-Patch/packages/*.deb
